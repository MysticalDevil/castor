name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test -- --nocapture

      - name: Install Tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Coverage Gate
        run: cargo tarpaulin --ignore-tests --fail-under 40 --out Stdout --timeout 300
